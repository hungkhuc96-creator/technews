name: Test (CI)

# Chạy toàn bộ test + typecheck mỗi lần push/PR — chặn "đỏ mà vẫn deploy".
on:
  push:
    branches: [main]
  pull_request: {}

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Test tích hợp cần Supabase (dùng dữ liệu test có tiền tố riêng, tự dọn).
      # KHÔNG cần ANTHROPIC_API_KEY — mọi test dùng chat giả.
      - name: Tạo .env.local
        run: |
          cat > .env.local <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          EOF

      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npx vitest run
