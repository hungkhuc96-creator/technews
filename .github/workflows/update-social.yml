name: Cập nhật X + YouTube (mỗi 4h)

# X (tốn credit Apify) + YouTube giữ nhịp thưa để tiết kiệm chi phí.
on:
  schedule:
    - cron: '0 */4 * * *'   # mỗi 4 giờ
  workflow_dispatch: {}

concurrency:
  group: update-social
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Tạo .env.local
        run: |
          cat > .env.local <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          APIFY_TOKEN=${{ secrets.APIFY_TOKEN }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          EOF

      - run: npm install --no-audit --no-fund
      - run: npm run ingest:youtube    # YouTube (kèm dịch tiêu đề)

      - name: Tóm tắt sẵn ý chính video mới (bỏ qua podcast dài)
        continue-on-error: true        # Gemini lỗi/hết hạn mức không chặn ingest
        run: npm run summarize:videos

      - name: Nạp X (Apify)
        continue-on-error: true        # X lỗi không chặn các bước trên
        run: npm run ingest:x
