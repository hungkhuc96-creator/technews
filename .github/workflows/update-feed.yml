name: Cập nhật feed tin

# Chạy tự động theo lịch + cho phép bấm chạy tay trên GitHub.
on:
  schedule:
    - cron: '0 */4 * * *'   # mỗi 4 giờ (đổi số 4 nếu muốn dày/thưa hơn)
  workflow_dispatch: {}

# Tránh 2 lần chạy chồng nhau.
concurrency:
  group: update-feed
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Tạo .env.local từ secrets để các script (dùng --env-file=.env.local) chạy được.
      - name: Tạo .env.local
        run: |
          cat > .env.local <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          APIFY_TOKEN=${{ secrets.APIFY_TOKEN }}
          EOF

      # npm install (không phải npm ci) để tự cài đúng thư viện theo hệ điều hành Linux của CI.
      - run: npm install --no-audit --no-fund

      # --- Lõi (miễn phí / Claude rẻ): báo chí + gom cụm + tóm tắt + YouTube ---
      - run: npm run ingest:press
      - run: npm run process:press
      - run: npm run summarize
      - run: npm run ingest:youtube

      # --- X qua Apify (tốn credit): best-effort, lỗi cũng không chặn các bước trên ---
      - name: Nạp X (Apify)
        continue-on-error: true
        run: npm run ingest:x
